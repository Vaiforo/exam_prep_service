services:
  exam-prep:
    build: .
    container_name: numerical-methods-exam-prep
    ports:
      - "8000:8000"
    volumes:
      - exam_prep_sqlite:/app/runtime
    environment:
      DATABASE_URL: sqlite:////app/runtime/app.db
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ALLOW_QUESTION_IMPORT: ${ALLOW_QUESTION_IMPORT:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      APP_VERSION: ${APP_VERSION:-76}
      CHAT_MAX_UPLOAD_MB: ${CHAT_MAX_UPLOAD_MB:-25}
      ONLINE_TIMEOUT_SECONDS: ${ONLINE_TIMEOUT_SECONDS:-60}
    restart: unless-stopped

volumes:
  exam_prep_sqlite:
